# ============================================================
#  OPAPP – GitHub Actions: iOS IPA bauen
#
#  Wird MANUELL gestartet:
#    GitHub → Actions → "Build iOS IPA" → Run workflow
#
#  Ergebnis:
#    → iOS IPA als Artifact zum Herunterladen (7 Tage verfuegbar)
#    → Danach manuell zum GitHub Release hinzufuegen
# ============================================================

name: 🍎 Build iOS IPA

on:
  workflow_dispatch:    # Nur manuell ueber GitHub UI starten

jobs:

  # ════════════════════════════════════════════════════════════
  #  iOS IPA auf macOS bauen
  # ════════════════════════════════════════════════════════════
  ios:
    name: 🍎 iOS IPA bauen
    runs-on: macos-latest

    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      - name: 🐦 Flutter einrichten
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📦 Dependencies installieren
        run: flutter pub get

      - name: 🔨 iOS App bauen (ohne Signierung)
        run: flutter build ios --release --no-codesign

      - name: 📦 IPA erstellen
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr '+' 'b' | tr -d ' ')
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r "../../../opapp_${VERSION}.ipa" Payload
          echo "IPA_NAME=opapp_${VERSION}.ipa" >> $GITHUB_ENV

      - name: 📤 IPA zum Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: opapp_*.ipa
          retention-days: 7

      - name: ✅ Fertig
        run: |
          echo "IPA erfolgreich erstellt: $IPA_NAME"
          echo "Download: GitHub → Actions → dieser Workflow-Run → Artifacts"
